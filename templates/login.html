<!DOCTYPE html>
<html>
<head>
    <title>DuduMail - Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; color: white; }
        .login-box { background: white; color: #333; padding: 30px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; }
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Accedi a DuduMail</h2>
        <form method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Entra</button>
        </form>
    </div>
</body>
</html>
