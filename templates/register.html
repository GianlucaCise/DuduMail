<!DOCTYPE html>
<html>
<head>
    <title>DuduMail - Registrazione</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #34495e; color: white; }
        .register-box { background: white; color: #333; padding: 30px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; }
        button { width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; cursor: pointer; }
        .login-link { display: block; margin-top: 15px; text-align: center; font-size: 0.9rem; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>Crea Account DuduMail</h2>
        <form method="post">
            <input type="text" name="username" placeholder="Scegli Username" required>
            <input type="password" name="password" placeholder="Scegli Password" required>
            <button type="submit">Registrati</button>
        </form>
        <a href="/login" class="login-link">Hai già un account? Accedi</a>
    </div>
</body>
</html>
